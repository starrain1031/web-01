spring:
  application:
    name: web-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: your_database_username
    password: your_database_password
#  servlet:
#    multipart:
#      max-file-size: 10MB
#      max-request-size: 100MB

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

tencent:
  cos:
    endpoint: myqcloud.com
    bucketName: your-bucket-name
    region: your-region

# Tencent COS credentials are read from environment variables:
# SECRETID=your-secret-id
# SECRETKEY=your-secret-key
#
# JWT secret should also be externalized before production use.